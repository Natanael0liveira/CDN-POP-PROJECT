<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976D2"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388E3C"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">INGRESS TRAFFIC FLOW</text>
  <text x="450" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Client Request → POP → Edge Server</text>
  
  <!-- Internet Cloud -->
  <ellipse cx="450" cy="100" rx="120" ry="40" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <text x="450" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1976D2">INTERNET</text>
  
  <!-- Client -->
  <rect x="50" y="80" width="100" height="40" rx="5" fill="#BBDEFB" stroke="#1976D2" stroke-width="2"/>
  <text x="100" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976D2">CLIENT</text>
  
  <!-- Arrow: Client to Internet -->
  <line x1="150" y1="100" x2="320" y2="100" stroke="#1976D2" stroke-width="2" marker-end="url(#arrowhead-blue)"/>
  <text x="235" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1976D2">1. SYN to VIP:443</text>
  
  <!-- Transit ISP Box -->
  <rect x="350" y="160" width="200" height="60" rx="5" fill="#FFF3E0" stroke="#F57C00" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100">TRANSIT ISP</text>
  <text x="450" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E65100">Anycast Routing</text>
  
  <!-- Arrow: Internet to Transit -->
  <line x1="450" y1="140" x2="450" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="470" y="155" font-family="Arial, sans-serif" font-size="10" fill="#666">2. Route to POP</text>
  
  <!-- Arista Switch -->
  <rect x="300" y="260" width="300" height="80" rx="5" fill="#E8F5E9" stroke="#388E3C" stroke-width="2"/>
  <text x="450" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E7D32">ARISTA SWITCH</text>
  <text x="450" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#388E3C">ECMP Hash (5-tuple)</text>
  <text x="450" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">src_ip + src_port + dst_ip + dst_port + proto</text>
  
  <!-- Arrow: Transit to Switch -->
  <line x1="450" y1="220" x2="450" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="470" y="245" font-family="Arial, sans-serif" font-size="10" fill="#666">3. Deliver to POP</text>
  
  <!-- Katran LB 1 -->
  <rect x="150" y="380" width="150" height="80" rx="5" fill="#FCE4EC" stroke="#C2185B" stroke-width="2"/>
  <text x="225" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C2185B">KATRAN LB-1</text>
  <text x="225" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#C2185B">XDP/eBPF</text>
  <text x="225" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">VIP: 203.0.113.10</text>
  
  <!-- Katran LB 2 -->
  <rect x="600" y="380" width="150" height="80" rx="5" fill="#FCE4EC" stroke="#C2185B" stroke-width="2"/>
  <text x="675" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C2185B">KATRAN LB-2</text>
  <text x="675" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#C2185B">XDP/eBPF</text>
  <text x="675" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">VIP: 203.0.113.10</text>
  
  <!-- Arrows: Switch to Katran LBs -->
  <line x1="350" y1="340" x2="225" y2="380" stroke="#388E3C" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <line x1="550" y1="340" x2="675" y2="380" stroke="#388E3C" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="280" y="355" font-family="Arial, sans-serif" font-size="10" fill="#388E3C">4. ECMP</text>
  
  <!-- Edge Servers -->
  <rect x="100" y="520" width="100" height="60" rx="5" fill="#E1F5FE" stroke="#0288D1" stroke-width="2"/>
  <text x="150" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0288D1">Edge-1</text>
  <text x="150" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">10.0.2.1</text>
  
  <rect x="220" y="520" width="100" height="60" rx="5" fill="#E1F5FE" stroke="#0288D1" stroke-width="2"/>
  <text x="270" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0288D1">Edge-2</text>
  <text x="270" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">10.0.2.2</text>
  
  <rect x="340" y="520" width="100" height="60" rx="5" fill="#E1F5FE" stroke="#0288D1" stroke-width="2"/>
  <text x="390" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0288D1">Edge-3</text>
  <text x="390" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">10.0.2.3</text>
  
  <rect x="460" y="520" width="100" height="60" rx="5" fill="#E1F5FE" stroke="#0288D1" stroke-width="2"/>
  <text x="510" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0288D1">Edge-4</text>
  <text x="510" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">10.0.2.4</text>
  
  <rect x="580" y="520" width="100" height="60" rx="5" fill="#E1F5FE" stroke="#0288D1" stroke-width="2"/>
  <text x="630" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0288D1">Edge-5</text>
  <text x="630" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">10.0.2.5</text>
  
  <rect x="700" y="520" width="100" height="60" rx="5" fill="#E1F5FE" stroke="#0288D1" stroke-width="2"/>
  <text x="750" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0288D1">Edge-6</text>
  <text x="750" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">10.0.2.6</text>
  
  <!-- Arrows: Katran to Edge Servers (IPIP) -->
  <line x1="225" y1="460" x2="150" y2="520" stroke="#C2185B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  <line x1="225" y1="460" x2="270" y2="520" stroke="#C2185B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  <line x1="225" y1="460" x2="390" y2="520" stroke="#C2185B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  <line x1="675" y1="460" x2="510" y2="520" stroke="#C2185B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  <line x1="675" y1="460" x2="630" y2="520" stroke="#C2185B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  <line x1="675" y1="460" x2="750" y2="520" stroke="#C2185B" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead-red)"/>
  
  <text x="180" y="490" font-family="Arial, sans-serif" font-size="10" fill="#C2185B">5. IPIP Encap</text>
  <text x="180" y="502" font-family="Arial, sans-serif" font-size="9" fill="#666">(Maglev Hash)</text>
  
  <!-- Legend -->
  <rect x="30" y="620" width="840" height="70" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">PACKET STRUCTURE (IPIP Encapsulated)</text>
  
  <!-- Packet diagram -->
  <rect x="100" y="655" width="80" height="25" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="140" y="672" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1976D2">Ethernet</text>
  
  <rect x="180" y="655" width="120" height="25" fill="#FFF3E0" stroke="#F57C00" stroke-width="1"/>
  <text x="240" y="667" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#E65100">Outer IP</text>
  <text x="240" y="677" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">src: 172.16.X.Y</text>
  
  <rect x="300" y="655" width="120" height="25" fill="#FCE4EC" stroke="#C2185B" stroke-width="1"/>
  <text x="360" y="667" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#C2185B">Inner IP</text>
  <text x="360" y="677" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">src: Client, dst: VIP</text>
  
  <rect x="420" y="655" width="60" height="25" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
  <text x="450" y="672" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#388E3C">TCP</text>
  
  <rect x="480" y="655" width="80" height="25" fill="#E1F5FE" stroke="#0288D1" stroke-width="1"/>
  <text x="520" y="672" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0288D1">Payload</text>
  
  <text x="600" y="672" font-family="Arial, sans-serif" font-size="10" fill="#666">Protocol: IPIP (4)</text>
</svg>